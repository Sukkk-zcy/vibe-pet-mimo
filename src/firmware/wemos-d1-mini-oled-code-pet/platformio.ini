[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit SSD1306@^2.5.13
build_flags =
  -DCODE_PET_DISPLAY_OLED
  -DCODE_PET_USE_WIFI
  -DCODE_PET_WIFI_SSID=\"\"
  -DCODE_PET_WIFI_PASSWORD=\"\"
  -DCODE_PET_BRIDGE_URL=\"http://192.168.1.2:17384/api/device-snapshot\"
  -DCODE_PET_DEVICE_NAME=\"VibePet-WEMOS-D1-OLED\"
  -DCP_OLED_WIDTH=64
  -DCP_OLED_HEIGHT=48
  -DCP_OLED_SDA=4
  -DCP_OLED_SCL=5
  -DCP_OLED_RST=-1
