[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  bodmer/TFT_eSPI@^2.5.43
  adafruit/Adafruit NeoPixel@^1.12.3
build_flags =
  -DCODE_PET_DISPLAY_TFT_ESPI
  -DCODE_PET_HAS_BLE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-ESP-AI-Common3-TFT\"
  -DCODE_PET_STATUS_PIXEL
  -DCP_STATUS_PIXEL_PIN=46
  -DCP_STATUS_PIXEL_BRIGHTNESS=56
  -DUSER_SETUP_LOADED
  -DST7789_DRIVER
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=240
  -DCP_TFT_HEIGHT=240
  -DCP_TFT_ROTATION=0
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=240
  -DTFT_MOSI=39
  -DTFT_SCLK=38
  -DTFT_CS=9
  -DTFT_DC=13
  -DTFT_RST=-1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT
