[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -DCODE_PET_DISPLAY_TFT_ESPI
  -DCODE_PET_HAS_BLE
  -DCODE_PET_DEVICE_NAME=\"VibePet-LILYGO-TDisplay\"
  -DUSER_SETUP_LOADED
  -DST7789_DRIVER
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=135
  -DCP_TFT_HEIGHT=240
  -DCP_TFT_ROTATION=1
  -DTFT_WIDTH=135
  -DTFT_HEIGHT=240
  -DTFT_MOSI=19
  -DTFT_SCLK=18
  -DTFT_CS=5
  -DTFT_DC=16
  -DTFT_RST=23
  -DTFT_BL=4
  -DTFT_BACKLIGHT_ON=HIGH
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT
