[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON
    -DCP_TFT_WIDTH=320
    -DCP_TFT_HEIGHT=240
    -DCP_TFT_ROTATION=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=23
    -DTFT_MISO=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=-1
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DSMOOTH_FONT
