[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  m5stack/M5Unified@^0.2.7
build_flags =
  -DCODE_PET_DISPLAY_M5UNIFIED
  -DCODE_PET_HAS_BLE
  -DCODE_PET_DEVICE_NAME=\"VibePet-M5StickC-Plus2\"
