[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -DCODE_PET_DISPLAY_TFT_ESPI
  -DCODE_PET_HAS_BLE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-LILYGO-TDisplay-S3\"
  -DUSER_SETUP_LOADED
  -DST7789_DRIVER
  -DTFT_PARALLEL_8_BIT
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=170
  -DCP_TFT_HEIGHT=320
  -DCP_TFT_ROTATION=1
  -DTFT_WIDTH=170
  -DTFT_HEIGHT=320
  -DTFT_CS=6
  -DTFT_DC=7
  -DTFT_RST=5
  -DTFT_WR=8
  -DTFT_RD=9
  -DTFT_D0=39
  -DTFT_D1=40
  -DTFT_D2=41
  -DTFT_D3=42
  -DTFT_D4=45
  -DTFT_D5=46
  -DTFT_D6=47
  -DTFT_D7=48
  -DTFT_BL=38
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT
